name: Build

on: [push]

jobs:
  Linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Compile
      run: cc forgecsv.c csv.c -o forgecsv

    - name: Upload
      uses: actions/upload-artifact@v7
      with: 
        name: forgecsv-linux-x86_64
        path: forgecsv
        archive: false

  macOS:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Compile
      run: cc forgecsv.c csv.c -o forgecsv

    - name: Upload
      uses: actions/upload-artifact@v7
      with: 
        name: forgecsv-macos-arm64
        path: forgecsv
        archive: false

  Windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        install: mingw-w64-x86_64-clang

    - name: Compile
      run: cc forgecsv.c csv.c -o forgecsv.exe

    - name: Upload
      uses: actions/upload-artifact@v7
      with: 
        name: forgecsv-windows-x86_64.exe
        path: forgecsv.exe
        archive: false
